<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Habit Heatmap</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff; --surface: #ffffff; --border: transparent;
            --text: #1a1714; --muted: #8c8278; --accent: #c97b8a;
            --l0: #ede9e3; --l1: #f4c8d2; --l2: #e8a0b0; --l3: #c97b8a; --l4: #a0495c;
            --radius: 10px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .card { background: var(--surface); border: none; padding: 1rem; }
        header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; margin: 0 0 15px 0; font-weight: 400; }
        header h1 em { color: var(--accent); font-style: italic; }
        .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .pill { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid #ede9e3; background: white; color: var(--muted); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        .heatmap-container { overflow-x: auto; padding-bottom: 10px; cursor: crosshair; }
        .grid { display: flex; flex-direction: column; gap: 3px; min-width: 800px; }
        .row { display: flex; gap: 3px; align-items: center; }
        .label { font-size: 9px; color: var(--muted); width: 22px; text-align: right; margin-right: 4px; text-transform: uppercase; }
        .sq { width: 12px; height: 12px; border-radius: 2px; background: var(--l0); transition: 0.1s; }
        .sq:hover { transform: scale(1.4); z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .l1 { background: var(--l1); } .l2 { background: var(--l2); } .l3 { background: var(--l3); } .l4 { background: var(--l4); }
        .legend { display: flex; align-items: center; gap: 5px; margin-top: 15px; font-size: 10px; color: var(--muted); }
        .leg-sq { width: 10px; height: 10px; border-radius: 2px; }
        /* Hide scrollbar */
        .heatmap-container::-webkit-scrollbar { height: 4px; }
        .heatmap-container::-webkit-scrollbar-thumb { background: #ede9e3; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h1>habit <em>heatmap</em></h1>
    </header>
    
    <div id="pills" class="pills">Detecting Notion habits...</div>
    
    <div class="heatmap-container">
        <div id="heatmap-grid" class="grid"></div>
    </div>

    <div class="legend">
        <span>less</span>
        <div class="leg-sq" style="background: var(--l0)"></div>
        <div class="leg-sq l1"></div>
        <div class="leg-sq l2"></div>
        <div class="leg-sq l3"></div>
        <div class="leg-sq l4"></div>
        <span>more</span>
    </div>
</div>

<script>

    let allData = [];
    let habits = [];
    let activeHabit = "Overview";

        try {
            const res = await fetch(PIPEDREAM_URL);
            allData = await res.json();

            if (allData.length > 0) {
                // Automatically find all Checkbox properties
                const props = allData[0].properties;
                habits = Object.keys(props).filter(key => props[key].type === "checkbox");
                habits.sort(); 
            }

            renderPills();
            renderHeatmap();
        } catch (e) {
            document.getElementById('pills').innerText = "Connection error. Check Notion/Pipedream.";
        }
    }
